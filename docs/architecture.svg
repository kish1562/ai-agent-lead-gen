<svg viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="900" height="460" fill="#f8f9fb"/>
  <text x="450" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#1C3C3C">AI Lead Generation Agent — LangGraph Workflow</text>

  <!-- Input -->
  <rect x="40" y="200" width="120" height="60" rx="8" fill="#fff" stroke="#555" stroke-width="2"/>
  <text x="100" y="226" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Web Form</text>
  <text x="100" y="244" text-anchor="middle" font-size="11" fill="#777">Lead Request</text>

  <!-- Workflow box -->
  <rect x="200" y="80" width="500" height="220" rx="12" fill="#eef5f4" stroke="#1C3C3C" stroke-width="2" stroke-dasharray="6"/>
  <text x="450" y="106" text-anchor="middle" font-size="13" font-weight="700" fill="#1C3C3C">LangGraph State Machine</text>

  <!-- Planner -->
  <rect x="230" y="140" width="120" height="60" rx="8" fill="#dff0e8" stroke="#2e7d52" stroke-width="2"/>
  <text x="290" y="166" text-anchor="middle" font-size="13" font-weight="700" fill="#2e7d52">PLANNER</text>
  <text x="290" y="184" text-anchor="middle" font-size="10" fill="#777">Decompose task</text>

  <!-- Executor -->
  <rect x="390" y="140" width="120" height="60" rx="8" fill="#e3eefb" stroke="#2864c4" stroke-width="2"/>
  <text x="450" y="166" text-anchor="middle" font-size="13" font-weight="700" fill="#2864c4">EXECUTOR</text>
  <text x="450" y="184" text-anchor="middle" font-size="10" fill="#777">Run tools</text>

  <!-- Verifier -->
  <rect x="550" y="140" width="120" height="60" rx="8" fill="#fbe9e9" stroke="#c0392b" stroke-width="2"/>
  <text x="610" y="166" text-anchor="middle" font-size="13" font-weight="700" fill="#c0392b">VERIFIER</text>
  <text x="610" y="184" text-anchor="middle" font-size="10" fill="#777">Validate</text>

  <!-- internal arrows -->
  <line x1="350" y1="170" x2="388" y2="170" stroke="#555" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="510" y1="170" x2="548" y2="170" stroke="#555" stroke-width="2" marker-end="url(#ar)"/>
  <!-- retry loop -->
  <path d="M610 200 Q610 250 450 250 Q290 250 290 202" fill="none" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arRed)"/>
  <text x="450" y="268" text-anchor="middle" font-size="10" fill="#c0392b">retry if invalid</text>

  <!-- input arrow -->
  <line x1="160" y1="230" x2="228" y2="180" stroke="#555" stroke-width="2" marker-end="url(#ar)"/>

  <!-- RAG -->
  <rect x="250" y="350" width="130" height="55" rx="8" fill="#fff3e0" stroke="#e67e22" stroke-width="2"/>
  <text x="315" y="374" text-anchor="middle" font-size="12" font-weight="600" fill="#e67e22">RAG Memory</text>
  <text x="315" y="391" text-anchor="middle" font-size="10" fill="#999">Vector DB</text>
  <line x1="450" y1="200" x2="330" y2="348" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="3" marker-end="url(#arOr)"/>

  <!-- MCP Salesforce -->
  <rect x="520" y="350" width="160" height="55" rx="8" fill="#e8f4fd" stroke="#00a1e0" stroke-width="2"/>
  <text x="600" y="374" text-anchor="middle" font-size="12" font-weight="600" fill="#0277bd">Salesforce (MCP)</text>
  <text x="600" y="391" text-anchor="middle" font-size="10" fill="#999">Create/Update Leads</text>
  <line x1="610" y1="200" x2="600" y2="348" stroke="#00a1e0" stroke-width="1.5" marker-end="url(#arBl)"/>

  <!-- Output -->
  <rect x="740" y="200" width="120" height="60" rx="8" fill="#dff0e8" stroke="#2e7d52" stroke-width="2"/>
  <text x="800" y="226" text-anchor="middle" font-size="12" font-weight="600" fill="#2e7d52">Response</text>
  <text x="800" y="244" text-anchor="middle" font-size="10" fill="#777">95% accuracy</text>
  <line x1="700" y1="190" x2="740" y2="215" stroke="#2e7d52" stroke-width="2" marker-end="url(#arGn)"/>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#555"/></marker>
    <marker id="arRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#c0392b"/></marker>
    <marker id="arOr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#e67e22"/></marker>
    <marker id="arBl" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#00a1e0"/></marker>
    <marker id="arGn" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2e7d52"/></marker>
  </defs>
</svg>
